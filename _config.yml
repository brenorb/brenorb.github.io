# Site
title:              Breno Brito
seo_title:          "Breno Brito | AI Engineer, Bitcoin, Finance"
bio:                '<a href="/tags/#ai">AI Engineer</a>, Data Scientist, Bitcoiner.'
description:        "Breno Brito is an AI engineer, data scientist, and writer covering Bitcoin, finance, language models, talks, and applied AI projects."
keywords:           "Breno Brito, artificial intelligence, AI engineering, Bitcoin, finance, data science, language models, 101 Perguntas sobre Bitcoin"
author:             Breno Brito
reading_time:       true
words_per_minute:   200
logo:               'assets/img/logo.png'
background:         'assets/img/placeholder-big.jpg'
tiled_bg:           false   # Set this true if you want to tile your background image, otherwise it will be covered
locale:             en_US
url:                https://brenorb.com
timezone:           America/Sao_Paulo
ai_content:         "allowed"
ai_topic:           "Artificial Intelligence, Bitcoin, Finance, Data Science"
ai_audience:        "engineers, researchers, Bitcoin builders, journalists, readers learning about AI and Bitcoin"
ai_use:             "Search, citation, summarization, indexing, and answer generation with attribution to https://brenorb.com"
same_as:
  - https://x.com/brenorb
  - https://github.com/brenorb
  - https://www.linkedin.com/in/brenorb/
knows_about:
  - Artificial Intelligence
  - Bitcoin
  - Finance
  - Data Science
  - Language Models
  - Quantitative Analysis

# Jekyll
permalink:          /:title/
markdown:           kramdown
highlighter:        rouge
kramdown:
  auto_ids:         true
  footnote_nr:      1
  entity_output:    as_char
  toc_levels:       1..6
  enable_coderay:   false
mathjax:            true
sass:
  sass_dir:         _sass
  style:            compressed
defaults:
  - scope:
      path: ""
      type: posts
    values:
      content_type: article

# Comments
disqus_shortname:   brenorb

