  - jekyll-mentions
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gist

plugins:
  - jekyll-gist
  - jekyll-feed
  - jekyll-mentions
  - jekyll-sitemap

jekyll-mentions:
