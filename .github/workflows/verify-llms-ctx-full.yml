name: Verify site assets

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  verify-site-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1.3
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify feature image sizes
        run: ruby scripts/check_feature_images.rb

      - name: Verify embedded media post coverage
        run: node scripts/check_media_sources.js

      - name: Verify transcript coverage
        run: node scripts/verify_media_transcripts.js

      - name: Regenerate topic chapter includes
        run: node scripts/build_topic_chapters.js

      - name: Verify generated chapter includes are up to date
        run: git diff --exit-code -- _includes/generated

      - name: Regenerate llms-ctx-full.txt
        run: ruby scripts/build-llms-ctx-full.rb

      - name: Verify generated file is up to date
        run: git diff --exit-code -- llms-ctx-full.txt
